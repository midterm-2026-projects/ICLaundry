name: CI

on:
  push:
    branches:
      - "**"

  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =====================================================
  # BACKEND TESTS
  # =====================================================
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: backend

    env:
      CI: true
      NODE_ENV: test

      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Run backend tests
        run: npm test

  # =====================================================
  # FRONTEND TESTS
  # =====================================================
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: frontend

    env:
      CI: true

      # The frontend currently sends requests to port 3000.
      VITE_API_URL: http://127.0.0.1:3000/api

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend unit tests
        run: npm run test:unit

      - name: Build frontend
        run: npm run build

  # =====================================================
  # PLAYWRIGHT E2E TESTS
  # =====================================================
  playwright-e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CI: true
      NODE_ENV: test

      # IMPORTANT:
      # The frontend log proves that it calls localhost:3000.
      # Therefore, the backend must also run on port 3000.
      PORT: 3000

      PLAYWRIGHT_BASE_URL: http://127.0.0.1:5173
      VITE_API_URL: http://127.0.0.1:3000/api

      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start backend on port 3000
        working-directory: backend
        shell: bash
        run: |
          set -e

          echo "Starting backend on port ${PORT}..."

          npm start > backend.log 2>&1 &

          BACKEND_PID=$!

          echo "${BACKEND_PID}" > backend.pid

          echo "Backend PID: ${BACKEND_PID}"

      - name: Wait for backend on port 3000
        working-directory: frontend
        shell: bash
        run: |
          set -e

          echo "Waiting for backend at tcp:127.0.0.1:3000..."

          npx wait-on \
            tcp:127.0.0.1:3000 \
            --timeout 120000

          echo "Backend port 3000 is available."

      - name: Verify backend process and port
        working-directory: backend
        shell: bash
        run: |
          set -e

          echo "===== BACKEND STARTUP LOG ====="
          cat backend.log || true

          if [ ! -f backend.pid ]; then
            echo "backend.pid was not created."
            exit 1
          fi

          BACKEND_PID="$(cat backend.pid)"

          if ! kill -0 "${BACKEND_PID}" 2>/dev/null; then
            echo "Backend process ${BACKEND_PID} is not running."
            cat backend.log || true
            exit 1
          fi

          echo "Backend process ${BACKEND_PID} is running."

          node -e "
            const net = require('node:net');

            const socket = net.createConnection(
              {
                host: '127.0.0.1',
                port: 3000,
              },
            );

            socket.setTimeout(5000);

            socket.on('connect', () => {
              console.log(
                'Successfully connected to backend port 3000.',
              );

              socket.end();
            });

            socket.on('timeout', () => {
              console.error(
                'Timed out connecting to backend port 3000.',
              );

              socket.destroy();
              process.exit(1);
            });

            socket.on('error', (error) => {
              console.error(
                'Unable to connect to backend port 3000:',
                error.message,
              );

              process.exit(1);
            });
          "

      - name: Verify frontend API configuration
        working-directory: frontend
        shell: bash
        run: |
          echo "PLAYWRIGHT_BASE_URL=${PLAYWRIGHT_BASE_URL}"
          echo "VITE_API_URL=${VITE_API_URL}"
          echo "Backend PORT=${PORT}"

          if [ "${VITE_API_URL}" != "http://127.0.0.1:3000/api" ]; then
            echo "VITE_API_URL does not match the backend port."
            exit 1
          fi

      - name: List discovered Playwright tests
        working-directory: frontend
        run: npx playwright test --list

      - name: Run Playwright E2E
        working-directory: frontend
        run: npm run test:e2e

      - name: Show backend logs
        if: always()
        working-directory: backend
        shell: bash
        run: |
          echo "===== COMPLETE BACKEND LOG ====="
          cat backend.log || true

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: frontend/test-results
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload backend logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-backend-logs
          path: backend/backend.log
          if-no-files-found: ignore
          retention-days: 7

  # =====================================================
  # FINAL CI RESULT
  # =====================================================
  ci-success:
    name: CI Passed
    runs-on: ubuntu-latest
    if: always()

    needs:
      - backend-tests
      - frontend-tests
      - playwright-e2e

    steps:
      - name: Check all job results
        shell: bash
        run: |
          echo "Backend tests: ${{ needs.backend-tests.result }}"
          echo "Frontend tests: ${{ needs.frontend-tests.result }}"
          echo "Playwright E2E: ${{ needs.playwright-e2e.result }}"

          if [ "${{ needs.backend-tests.result }}" != "success" ] || \
             [ "${{ needs.frontend-tests.result }}" != "success" ] || \
             [ "${{ needs.playwright-e2e.result }}" != "success" ]; then
            echo "One or more CI jobs failed."
            exit 1
          fi

          echo "All CI jobs passed."
